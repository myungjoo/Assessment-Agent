name: CI

# Assessment-Agent 의 PR (main 대상) / main push 마다 동작하는 기본 CI.
# Node 20 LTS + pnpm 9 (ADR-0001) 기반으로 lint / build / test 를 실행한다.
# 정책: CLAUDE.md §3.1 상 .github/workflows/ 는 pr-mode 영역.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # reviewer comment 추가 시 CI 자동 재실행 — reviewer-approval 검증 게이트가 다시 평가될 수 있도록.
  issue_comment:
    types: [created, edited]
  # GitHub formal review 추가 시도 (다른 identity 의 reviewer-bot 도입 시 활용).
  pull_request_review:
    types: [submitted]

# GITHUB_TOKEN scope 명시: checkout 용 contents:read + gh pr view (reviews/comments GraphQL) 용 pull-requests:read (T-0018 patch).
permissions:
  contents: read
  pull-requests: read

# ADR-0036 §Decision 6 / §rollout stage 4 — per-PR concurrency group.
# group 식별자: pull_request push 와 pull_request_review 는 PR 번호로 ci-<PR#> 그룹에 묶이고,
# main push 는 github.ref(=refs/heads/main)로 ci-refs/heads/main 그룹이 된다. issue_comment 는
# github.event.pull_request 가 null(PR data 는 event.issue.pull_request 아래)이라 github.ref 로
# 폴백돼 ci-refs/heads/main 그룹에 합류한다(STATE.json benignRedNote case B 와 일치). 서로 다른
# PR 과 main push 는 별개 그룹이라 서로 cancel 하지 않는다(비용이 동시 driver 수 N 선형 안에 머묾).
# cancel-in-progress 는 pull_request event 일 때만 true — 그래서 같은 PR 의 연속 push 만 직전 run 을
# cancel 하고, main push·issue_comment·pull_request_review 의 연속 run 은 cancel 하지 않아
# main-push CI green 게이트(CLAUDE.md §11 / R-114)와 approval-gate rerun(§3.3 gate-2) 무결성을 보호한다.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: 기본 검사
    runs-on: ubuntu-latest
    # issue_comment event 시엔 PR 의 comment 일 때만 실행 (issue comment 는 무시).
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request != null
    # ADR-0004 §Decision — smoke/e2e 가 실 PostgreSQL 16 container 위에서 발화.
    # PrismaService 의 `onModuleInit` 의 `$connect` 가 본 services.postgres 의
    # localhost:5432 로 connection 을 establish (T-0053 머지 후 실 query 발화).
    # T-0052 본 task 머지 시점엔 smoke/e2e 4 spec 이 여전히 mock override 유지로
    # 실 query 발화 0 — services.postgres 부트는 무해 (idle DB) + migrate deploy
    # step 만 실 query 발화 (schema 생성).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: assessment_test
        ports:
          - 5432:5432
        # health-cmd / health-interval / health-retries — ADR-0004 §Decision 박제.
        # pg_isready 가 ready 응답할 때까지 max 50s (10 retry × 5s interval) 대기.
        # GitHub Actions 가 services 의 health 가 green 일 때만 후속 step 시작.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    # DATABASE_URL — job 전체 scope 에 주입. PrismaService 의 buildPrismaAdapter()
    # 가 process.env.DATABASE_URL 을 읽어 PrismaPg adapter 를 구성한다 (T-0033).
    # unit test (pnpm test:cov) 도 본 env 를 보지만 PrismaService 의 onModuleInit
    # 자체가 mock 으로 치환되므로 영향 0. smoke/e2e 도 본 task 시점엔 mock
    # override 유지 — DATABASE_URL 은 migrate deploy step 의 prisma CLI 가 사용.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assessment_test?schema=public
    steps:
      - name: 저장소 checkout
        uses: actions/checkout@v4
        with:
          # spec-presence 검사가 origin/main 과 diff 를 비교하려면 history 가 필요.
          fetch-depth: 0

      - name: spec 파일 동반 여부 검사
        # CLAUDE.md §3.2 R-112 의 1차 자동 layer. 자세한 규칙은 scripts/check-spec-presence.sh 참조.
        run: |
          git fetch --no-tags --depth=1 origin main
          BASE_REF=origin/main bash scripts/check-spec-presence.sh

      - name: spec-presence 자체 test
        run: bash scripts/check-spec-presence.test.sh

      - name: doc-only 판정 script 자체 test
        # reviewer-approval 게이트의 doc-only 면제 logic(scripts/check-doc-only-pr.sh)
        # 의 executable spec. spec-presence 자체 test 와 동형의 self-test layer.
        run: bash scripts/check-doc-only-pr.test.sh

      - name: ref-CAS lock 검증
        # ADR-0009 ref-CAS lock 의 --force-with-lease CAS 의미 executable spec.
        # self-contained (로컬 bare repo + 2 clone) 이라 remote/네트워크 불요.
        run: bash scripts/verify-ref-cas-lock.sh

      - name: select-claim CAS 검증
        # ADR-0036 fine-grained concurrency stage 2 slice 1 — lock-하 atomic
        # select+claim primitive(scripts/select-claim.sh)의 executable spec.
        # 정확성 게이트 "이중 claim 0"(§rollout 2) 박제. ref-CAS lock 검증과
        # 동형으로 self-contained(로컬 bare repo + 2 clone)라 네트워크/credential 불요.
        run: bash scripts/select-claim.test.sh

      - name: reclaim-stale-claim 검증
        # ADR-0036 fine-grained concurrency stage 2 slice 2 — lock-하 orphan
        # claim staleness 회수(60분 server-time 임계) + PR-resume primitive
        # (scripts/reclaim-stale-claim.sh)의 executable spec. 정확성 게이트
        # "orphan 회수 정상 동작 검증"(§rollout 2) 박제. select-claim CAS 검증과
        # 동형으로 self-contained(로컬 bare repo + 2 clone)라 네트워크/credential 불요.
        run: bash scripts/reclaim-stale-claim.test.sh

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Lint 검사
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Web 빌드
        # ADR-0040 §3 — web/ Vite React SPA 빌드(tsc --noEmit 타입검사 + vite build → web/dist).
        # 향후 R-113 통합 검증(web-static smoke)의 전제이자 SPA 타입/빌드 회귀 가드. T-0405(T-0355 CI slice).
        run: pnpm --filter web build

      - name: Web 단위 test
        # CLAUDE.md §3.2 R-111/R-113 — web/ vitest 스위트를 CI 에서 자동 실행한다
        # (기존엔 로컬 tester 만 실행 = T-0353 reviewer MINOR gap). T-0405.
        run: pnpm --filter web test

      - name: Prisma migrate deploy
        # ADR-0004 §Migration 의무 #3 박제 — services.postgres 의 assessment_test
        # DB 에 prisma/migrations/ 의 3 migration (init / service_identity /
        # group_part) 을 순차 적용. prisma CLI 는 package.json L33 의 prisma
        # ^7.8.0 로 이미 설치됨 (T-0033) — 새 dep 0.
        # 본 step 이 fail 하면 후속 test:smoke / test:e2e 도 자연 fail (T-0053
        # 머지 후 실 query 발화 시점부터). T-0052 시점엔 mock override 가 보호.
        run: pnpm prisma migrate deploy

      - name: 테스트 + 커버리지 검사
        # CLAUDE.md §3.2 R-112 2 차 layer: jest 의 coverageThreshold (package.json) 가
        # 미달일 경우 exit code 비0 -> CI fail. T-0008 도입.
        run: pnpm test:cov

      - name: 스모크 테스트
        # CLAUDE.md §3.2 R-113 의 smoke 부분. NestJS app 부트스트랩 + GET / healthcheck.
        # unit / coverage step 과 격리된 별도 jest config (test/jest-smoke.json). T-0009 도입.
        run: pnpm test:smoke

      - name: e2e test
        # CLAUDE.md §3.2 R-113 의 e2e 부분. 응답 contract (status + header + body)
        # 와 flow 를 검증. unit / coverage / smoke step 과 격리된 별도 jest config
        # (test/jest-e2e.json). T-0010 도입.
        run: pnpm test:e2e

      - name: reviewer agent approval 검증
        # CLAUDE.md §3.3 4-게이트 (b) 의 외부 자동 layer. PR event 일 때만 실행.
        # PR-5/6/7 reviewer 우회 패턴 (미 dispatch / 위장 / comment 누락) 자동 차단.
        # 통과 조건 (둘 중 하나):
        #   (a) GitHub formal review 가 APPROVED 1+ (별도 identity reviewer-bot 도입 시 활용)
        #   (b) PR conversation comment 중 case-insensitive 로 approve 어휘 (한글/영어) 1+ 매칭
        # main push event 는 PR 거치지 않은 doc-only direct commit (§3.1) 이라 skip.
        if: github.event_name == 'pull_request' || github.event_name == 'issue_comment' || github.event_name == 'pull_request_review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          if [ -z "$PR_NUM" ]; then echo "::error::PR 번호 추출 실패"; exit 1; fi

          # (0) doc-only 면제 (CLAUDE.md §3.1) — 변경이 전부 direct-mode 문서면 게이트 skip.
          # gh API 로 변경 파일 목록 취득 (event-independent — issue_comment 재실행은
          # default branch checkout 라 local git diff 로는 PR 변경을 못 본다).
          # scripts/check-doc-only-pr.sh 가 없거나(예: 본 helper 도입 전 PR 의 재실행)
          # 판정이 doc-only 가 아니면 아래 (a)/(b) reviewer-approval 검사로 진행.
          if [ -f scripts/check-doc-only-pr.sh ] \
            && gh pr view "$PR_NUM" --json files --jq '.files[].path' \
               | bash scripts/check-doc-only-pr.sh; then
            echo "✅ doc-only PR — reviewer-approval 게이트 면제 (CLAUDE.md §3.1 direct-mode 경계)"
            exit 0
          fi

          # (a) GitHub formal review APPROVED 1+
          FORMAL=$(gh pr view "$PR_NUM" --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          if [ "$FORMAL" -ge 1 ]; then
            echo "✅ GitHub formal review APPROVED ($FORMAL 건) — 4-게이트 (b) 통과"
            exit 0
          fi

          # (b) PR comment 중 approve 어휘 매칭 (case-insensitive, 한/영)
          PATTERN='approve|approved|approval|lgtm|ok[ -]to[ -]merge|ready[ -]to[ -]merge|allowed[ -]to[ -]merge|merge[ -]?ok|sign[ -]?off|signed[ -]off|ship[ -]?it|승인|머지\s*가능|머지\s*해도\s*(됨|좋음|괜찮)|통과|합의|인정'
          MATCHES=$(gh pr view "$PR_NUM" --json comments --jq '.comments[].body' \
            | grep -ciE "$PATTERN" || true)
          if [ "$MATCHES" -ge 1 ]; then
            echo "✅ reviewer comment 에 approve 어휘 $MATCHES 건 매칭 — 4-게이트 (b) 통과"
            exit 0
          fi

          echo "::error::4-게이트 (b) 위반 — formal review APPROVED 0건 + comment approve 어휘 매칭 0건."
          echo "::error::reviewer agent 가 PR 에 review comment 를 post 했는지 확인. CLAUDE.md §3.3 / reviewer.md Post 의무 참조."
          exit 1

  # T-0429 — 배포 산출물(Dockerfile / deploy 스크립트) 검증 job.
  # 기본 ci job 과 독립 병렬 실행. Docker 빌드 실패 / 스크립트 문법 오류가 PR 을
  # red 로 만들어 merge 를 차단한다 (R-111/R-114). 사용자 요구 "CI 에서 docker
  # 만드는 것까지 시험" 의 구현체.
  deploy-artifacts:
    name: 배포 산출물 검증 (Docker 빌드 + 스크립트 문법)
    runs-on: ubuntu-latest
    # issue_comment(approval-gate 재실행) event 시엔 PR 일 때만 — 무의미한 빌드 회피.
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request != null
    steps:
      - name: 저장소 checkout
        uses: actions/checkout@v4

      - name: 배포 스크립트 문법 검사
        # entrypoint(POSIX sh) / redeploy(bash) 의 문법 오류를 실행 없이 catch.
        run: |
          sh -n deploy/docker-entrypoint.sh
          bash -n deploy/redeploy.sh

      - name: Docker 이미지 빌드 (배포 산출물 검증, push 없음)
        # Dockerfile 전체(pnpm install → backend build → web build → prune → runtime)
        # 를 end-to-end 빌드해 배포 가능 상태를 검증. 레지스트리 push 는 하지 않는다.
        run: docker build -t assessment-agent:ci .
