name: CI

# Assessment-Agent 의 PR (main 대상) / main push 마다 동작하는 기본 CI.
# Node 20 LTS + pnpm 9 (ADR-0001) 기반으로 lint / build / test 를 실행한다.
# 정책: CLAUDE.md §3.1 상 .github/workflows/ 는 pr-mode 영역.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: 기본 검사
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 checkout
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Lint 검사
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test 실행
        run: pnpm test
